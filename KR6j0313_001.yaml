body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯如是我聞一時佛在香醉山五髻乾闥婆王宮彼有種種鼓樂弦歌出微妙音爾時世尊處大殿中與諸菩薩摩訶薩衆俱復有諸大聖衆皆來集會所謂有學無學諸聲聞衆并無量無邊天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等復有無量無邊成就持明持金剛者金剛手及忿怒王持明王百千等衆復有具種種持明寶髻佛頂輪王等衆復有宿曜并母鬼母鬼主及諸釋梵大自在天那羅延天慶自在天大黑天神童子天夜摩天水天風天四天王天并五通仙人等俱來在會作廣大供養圍繞承事合掌恭敬爾時世尊處於衆會譬如須彌顯于大海是時五髻乾闥婆王與七十二百千乾闥婆女作種種妓樂來詣佛所到已頭面禮足繞佛三匝却住一面合掌向佛而作是言世尊我今願聞利益之事唯願世尊為我宣説彼聖多羅菩薩即是諸佛如來之慈心是大明王降魔最勝是大持明是大輪王廣顯甚深具大勢力唯願世尊悲慜於我及天人阿修羅等常得利益獲安樂故宣説聖多羅菩薩一百八名爾時世尊受五髻乾闥婆王請已讚言善哉善哉乾闥婆王汝能問於如來如是之義令諸天人一切衆會得大利益獲安樂故汝當諦聽善思念之我今為汝次第宣説時彼乾闥婆王聞佛語已受教而聽爾時世尊為彼乾闥婆王及一切衆會先説聖多羅菩薩陀羅尼曰那莫三滿多那哩始二合毗藥二合一薩哩嚩二合怛他引誐帝引毗踰二合引二阿囉曷二合訥毗藥三合三三藐三沒提引毗藥二合四那謨引婆誐嚩帶曳二合引五阿哩也二合多囉曳引六唵引薩哩嚩二合怛他引誐多引七怛他多部引多酤引致八波哩戍提沒提引薩哩嚩二合怛他引誐多九薩哩嚩二合達哩摩二合多引十誐誐那阿末羅尾戍馱引達哩摩二合帝引十一摩賀引那野波哩嚩引哩莎賀引十二爾時世尊説此陀羅尼已復為乾闥婆王及一切衆會宣説多羅菩薩一百八名而説頌曰是多羅菩薩本從阿字生或生諸行相不生亦不滅是相如虛空虛空性生故隨應現本相相一多無礙色相現無邊善寂體純一常現幻化相密語真實語攝大真實理真實行常行施於無所畏寂靜常除恚離諸怖畏苦善破煩惱籠能解三有縛苦海悉永離成就法能為自他俱成就唯施最上法總持自在王亦從總持生施總持大義相應大自在心意具相應不即相應相相應相不離定意常不動有動皆寂然常處蓮華座亦從蓮華生目淨如青蓮常為衆生目清淨最殊妙慈眼視衆生佛慧眼無漏具純一大悲常發大悲心常行大悲行亦從大悲生常具大悲心難伏垂悲愍以悲普遍降所有苦惱者除苦令歡喜法施甘露味濟苦獲安樂苦海意清涼是名自在母普世為照耀妙容熾盛光衆寶珠髻冠清淨光圓滿摩尼真珠飾髮髻色紺青螺文相右旋莊嚴無為體不善者令善一切願皆圓無喻莊嚴身善意亦善逝寂靜常安樂大力如意通六念具六通得諸波羅蜜善説四諦法開迷大辨才幻化苦海中現行幻化相持劍破煩惱弓箭與三叉鉢致仗及槍都摩囉爍帝沒誐囉金剛種種諸器仗觀視所持箭悉施無所畏手擲金剛杵現作無礙通能伏外敵軍表剎現幢相具大智慧力善破勇猛軍諸暗煩惱銷魔冤賊悉破如日銷昏冥是為上最勝善度輪回海最上大吉祥實際住唯真名聞稱普遍常施愛敬願自勝復勝他歡喜施常行微妙最善寂是即如來智普仰如意珍戒相具足持以戒行正道梵音甚微妙三世最上音微妙一響聲如虛空大藏善生諸世間無諍依怙者三乘為依怙依行行三乘解脫三乘教諸佛依三乘五面亦五眼依五智性生正覺成菩提即是大正道一切種種相殊妙清淨身皆隨應現生照世如宿曜自能達彼岸亦善渡他人隨意化百千巧攝諸善義百千福具足純一化世間善捨一切財種種幻化相世間大自在吉祥諸天尊持妙青色蓮具戒施諸願樂善常寂靜大靜慧焰光諸惡障永除是一切魔主度難與安樂無等平等心鬪諍悉永除善離怖畏死部多主宰母示作夜叉王現身為大龍具百頭千目百舌大惡相真實無畏心勝種具百千地天善持世常樂無畏語疾疫毒永除殊妙大光明無垢常清淨一切世間母持法利世間最勝灌頂王所作皆已辦具十波羅蜜十地位常居藏顯十法乘十大真實理住十金剛句表剎十法成十智除暗冥觀世自在眼具大妙色相等虛空無邊或現五通仙具戒自在相離欲身應供寂靜道常安正覺所讚揚是多羅菩薩爾時世尊説此頌已告乾闥婆王及一切衆會此是多羅菩薩一百八名我已為汝宣説汝等應當至心受持此多羅菩薩一百八名及陀羅尼過去未來諸佛已説當説為一切衆生利益悲慜故若有善男子善女人發至誠心於清旦時或為自他誦此多羅菩薩一百八名并陀羅尼乃至默念或用匹帛為幀或於淨壁依法以最上妙色畫菩薩像或用檀香木作菩薩形以清淨心隨意成辦然後於菩薩像前設種種供養一日三時合掌作禮依法至心而作觀想誦此一百八名及陀羅尼此多羅菩薩具大勢力最上吉祥求銷諸罪善破魔軍於初中善而能施彼成就之法若復有人發至誠心持念一遍七遍乃至二十七遍當念誦時不闕文句是人一切富貴吉祥之事及成就法隨願獲得永無障礙得諸賢聖隱其本身常作擁護又復得天龍夜叉釋梵護世那羅延天大自在天并母鬼主大黑天神頻那夜迦慶自在天等乃至得諸佛菩薩緣覺聲聞一切忿怒王大威德明王等咸作是言善哉善哉善男子汝等具於諸佛菩薩之行當生蘇珂嚩帝佛剎是時五髻乾闥婆王歡喜踊躍心生信重即從座起自解己身無價瓔珞金銀真珠摩尼珍寶種種嚴身之具供養於佛合掌恭敬瞻仰世尊而説讚曰善哉世尊甚奇善逝常以悲心救護一切而能為我及於衆會説此最上真實之義爾時世尊説是經已彼諸菩薩摩訶薩及諸聲聞并持明者大忿怒主一切明王諸天人衆及五髻乾闥婆等聞佛所説皆大歡喜信受奉行
